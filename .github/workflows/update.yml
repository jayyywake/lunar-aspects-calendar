name: Update Lunar Aspects Calendar

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      # Installing the required ephem and ics libraries
      run: |
        python -m pip install --upgrade pip
        pip install ephem==4.1.5 ics==0.7.2

    - name: Run calendar generator
      run: python generate_lunar_aspects.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add lunar_aspects.ics
        git diff-index --quiet HEAD || git commit -m "Update lunar aspects"
        git push
